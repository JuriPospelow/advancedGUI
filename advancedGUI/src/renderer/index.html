<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>advancedGUI</title>
  <link rel="stylesheet" href="src/styles/app.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>advancedGUI</h1>
      <div class="header-right">
        <span id="device-count">0 devices</span>
        <span id="status" class="disconnected">disconnected</span>
        <button id="btn-login" class="hidden">Login</button>
        <button id="btn-logout" class="hidden">Logout</button>
      </div>
    </header>

    <nav id="tabs">
      <button class="tab active" data-tab="values">Values</button>
      <button class="tab" data-tab="config">Config</button>
      <button class="tab" data-tab="health">Health</button>
      <button class="tab" data-tab="mock">Mock</button>
      <button class="tab" data-tab="log">Log</button>
    </nav>

    <main>
      <section id="tab-values" class="tab-content active"></section>
      <section id="tab-config" class="tab-content"></section>
      <section id="tab-health" class="tab-content"></section>
      <section id="tab-mock" class="tab-content"></section>
      <section id="tab-log" class="tab-content"></section>
    </main>

    <div id="login-overlay" class="hidden">
      <div class="login-dialog">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username" />
        <input type="password" id="login-password" placeholder="Password" />
        <p id="login-error" class="hidden"></p>
        <button id="btn-login-submit">Login</button>
        <button id="btn-login-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="src/values.js"></script>
  <script src="src/config.js"></script>
  <script src="src/health.js"></script>
  <script src="src/mock.js"></script>
  <script src="src/log.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
